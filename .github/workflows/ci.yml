name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          # Slim install — only what the test suite imports.
          # Pipeline.py defers heavy ML imports (timm, transformers, clip,
          # opencv-python) to initialize(), which the tests mock out.
          pip install \
            "fastapi>=0.115,<1" "pydantic>=2.9,<3" "python-multipart>=0.0.18,<1" \
            "numpy>=1.26,<3" "torch>=2.6,<3" \
            "structlog>=24.4,<26" "python-json-logger>=2.0.7,<4" \
            "python-dotenv>=1.0,<2" \
            "pytest>=8.3,<9" "httpx>=0.27,<1"
      - name: Run pytest
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
